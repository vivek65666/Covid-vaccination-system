<!DOCTYPE html>
<html>
<head>
    <title>Edit Record</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center">Edit Vaccination Record</h2>

    <form method="POST">

        <label>Name</label>
        <input type="text" name="name" class="form-control" value="{{ data[1] }}" required>

        <label class="mt-2">Age</label>
        <input type="text" name="age" class="form-control" value="{{ data[2] }}" required>

        <label class="mt-2">Vaccine</label>
        <input type="text" name="vaccine" class="form-control" value="{{ data[3] }}" required>

        <button class="btn btn-primary mt-3">Update</button>

        <a href="/view" class="btn btn-secondary mt-3">Cancel</a>

    </form>

</div>

</body>
</html>
